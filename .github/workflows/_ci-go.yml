name: CI - Go (Reusable)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      ecr_repo:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service }}/go.sum

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test ./... -v -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: ${{ inputs.service }}

  security-scan:
    name: Security Scan (SAST + SCA)
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service }}/go.sum

      - name: SCA - Trivy (dependências)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service }}
          severity: CRITICAL
          exit-code: "1"
          format: table

      - name: SAST - gosec
        uses: securego/gosec@master
        with:
          args: "-severity high -confidence high -quiet ./${{ inputs.service }}/..."

  docker-build-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Gerar tag da imagem
        id: tag
        run: echo "tag=v1.0.0-$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem Docker
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repo }}:${{ steps.tag.outputs.tag }} .
        working-directory: ${{ inputs.service }}

      - name: Container Scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repo }}:${{ steps.tag.outputs.tag }}
          severity: CRITICAL
          exit-code: "1"
          format: table

      - name: Push para o ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repo }}:${{ steps.tag.outputs.tag }}

  update-gitops:
    name: Atualizar manifesto GitOps
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Atualizar tag no deployment.yaml
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repo }}
          NEW_TAG=${{ needs.docker-build-push.outputs.image_tag }}
          sed -i "s|image: ${IMAGE_URI}:.*|image: ${IMAGE_URI}:${NEW_TAG}|g" \
            ${{ inputs.service }}/k8s/deployment.yaml

      - name: Commit e push do manifesto atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.service }}/k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: atualiza imagem ${{ inputs.service }} para ${{ needs.docker-build-push.outputs.image_tag }}"
          git push
