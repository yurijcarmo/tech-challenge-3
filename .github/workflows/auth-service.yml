name: CI - auth-service

on:
  push:
    branches: [main]
    paths:
      - "auth-service/**"
  pull_request:
    branches: [main]
    paths:
      - "auth-service/**"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/_ci-go.yml
    with:
      service: auth-service
      ecr_repo: auth-service
    secrets: inherit
