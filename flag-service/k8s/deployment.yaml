apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: flag-service
  labels:
    app: flag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      initContainers:
        - name: db-init
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME" -f /migrations/init.sql
          envFrom:
            - configMapRef:
                name: flag-service-config
            - secretRef:
                name: flag-service-secrets
          volumeMounts:
            - name: db-init
              mountPath: /migrations
      containers:
        - name: flag-service
          image: 930110167229.dkr.ecr.us-east-1.amazonaws.com/flag-service:v1.0.0-e8d175c
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "200m"
              memory: "250Mi"
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          envFrom:
            - configMapRef:
                name: flag-service-config
            - secretRef:
                name: flag-service-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: db-init
          configMap:
            name: flag-service-db-init
