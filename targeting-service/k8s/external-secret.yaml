apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: targeting-service-secrets
  namespace: targeting-service
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: targeting-service-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: eks/targeting-service
