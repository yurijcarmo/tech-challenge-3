apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: evaluation-service-secrets
  namespace: evaluation-service
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: evaluation-service-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: eks/evaluation-service
